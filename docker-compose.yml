services:
  savix-db:
    image: postgres
    restart: always
    container_name: savix-db
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - savix-db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  savix-redis:
    image: redis:alpine
    restart: always
    container_name: savix-redis
    expose:
      - "6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}

volumes:
  savix-db-data: